<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment 2</title>
<style>
body {
    font-family: Arial;
    padding: 20px;
}
input, button {
    margin: 5px;
    padding: 5px;
}
.output {
    background: #f4f4f4;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>
<body>

<h2>1. Even Numbers (1–100)</h2>
<button onclick="showEven()">Show Even Numbers</button>
<div class="output" id="even"></div>

<h2>2. Calculator</h2>
<input type="number" id="num1" placeholder="Enter number 1">
<input type="number" id="num2" placeholder="Enter number 2">
<br>
<button onclick="calc('+')">Add (+)</button>
<button onclick="calc('-')">Subtract (-)</button>
<button onclick="calc('*')">Multiply (*)</button>
<button onclick="calc('/')">Divide (/)</button>
<div class="output" id="calc"></div>

<h2>3. Tax Calculation</h2>
<input type="number" id="salary" placeholder="Enter salary">
<button onclick="taxCalc()">Find Tax</button>
<div class="output" id="tax"></div>

<h2>4. Sum of Products</h2>
<input type="number" id="n1" placeholder="Enter n1">
<input type="number" id="n2" placeholder="Enter n2">
<button onclick="sumCalc()">Calculate</button>
<div class="output" id="sum"></div>

<script>
function showEven() {
    let result = "";
    for (let i = 1; i <= 100; i++) {
        if (i % 2 === 0) result += i + " ";
    }
    document.getElementById("even").innerText = result;
}

function calculate(a, b, op) {
    switch(op) {
        case '+': return a + b;
        case '-': return a - b;
        case '*': return a * b;
        case '/': return b != 0 ? a / b : "Cannot divide by zero";
        default: return "Invalid operator";
    }
}

function calc(op) {
    let a = parseFloat(document.getElementById("num1").value);
    let b = parseFloat(document.getElementById("num2").value);
    document.getElementById("calc").innerText = calculate(a, b, op);
}

function findTax(salary) {
    switch(true) {
        case (salary > 0 && salary <= 500000): return 0;
        case (salary <= 1000000): return salary * 0.10;
        case (salary <= 1500000): return salary * 0.20;
        case (salary > 1500000): return salary * 0.30;
        default: return "Invalid";
    }
}

function taxCalc() {
    let sal = parseFloat(document.getElementById("salary").value);
    document.getElementById("tax").innerText = findTax(sal);
}

function sumOfProducts(n1, n2) {
    let sum = 0;
    while (n1 > 0 || n2 > 0) {
        let d1 = n1 % 10;
        let d2 = n2 % 10;
        sum += d1 * d2;
        n1 = Math.floor(n1 / 10);
        n2 = Math.floor(n2 / 10);
    }
    return sum;
}

function sumCalc() {
    let n1 = parseInt(document.getElementById("n1").value);
    let n2 = parseInt(document.getElementById("n2").value);
    document.getElementById("sum").innerText = sumOfProducts(n1, n2);
}
</script>

</body>
</html>
