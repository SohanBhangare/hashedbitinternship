<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment 9</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-dark text-white">

<div class="container py-4">
  <h2 class="text-center mb-4">Assignment 9 Output</h2>

  <div class="row g-3">

    <div class="col-md-6">
      <div class="card bg-secondary p-3">
        <h5>Q1 Scope</h5>
        <p id="q1"></p>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card bg-secondary p-3">
        <h5>Q2 Second Fruit</h5>
        <p id="q2"></p>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card bg-secondary p-3">
        <h5>Q3 Push & Pop</h5>
        <p id="q3"></p>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card bg-secondary p-3">
        <h5>Q4 Square (map)</h5>
        <p id="q4"></p>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card bg-secondary p-3">
        <h5>Q5 Filter Odd</h5>
        <p id="q5"></p>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card bg-secondary p-3">
        <h5>Q6 Greeting</h5>
        <p id="q6"></p>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card bg-secondary p-3">
        <h5>Q7 Rectangle Area</h5>
        <p id="q7"></p>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card bg-secondary p-3">
        <h5>Q8 Object Keys</h5>
        <p id="q8"></p>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card bg-secondary p-3">
        <h5>Q9 Merge Objects</h5>
        <p id="q9"></p>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card bg-secondary p-3">
        <h5>Q10 Reduce Sum</h5>
        <p id="q10"></p>
      </div>
    </div>

  </div>
</div>

<script>

// Q1
function scopeDemo() {
  return "var: function scope, let & const: block scope";
}
document.getElementById("q1").innerText = scopeDemo();


// Q2
let fruits = ["Apple", "Banana", "Mango", "Orange", "Grapes"];
document.getElementById("q2").innerText = fruits[1];


// Q3
function modifyArray(arr) {
  arr.push("New");
  arr.pop();
  return arr;
}
document.getElementById("q3").innerText = modifyArray([1,2,3]);


// Q4
function squareNumbers(arr) {
  return arr.map(n => n * n);
}
document.getElementById("q4").innerText = squareNumbers([1,2,3,4]);


// Q5
function filterOdd(arr) {
  return arr.filter(n => n % 2 !== 0);
}
document.getElementById("q5").innerText = filterOdd([1,2,3,4,5,6]);


// Q6
let person = { name:"Sohan", age:20, occupation:"Student" };
function greet() {
  return `Hello, my name is ${person.name}, I am ${person.age} years old and I am a ${person.occupation}`;
}
document.getElementById("q6").innerText = greet();


// Q7
function rectangleArea(obj) {
  return obj.width * obj.height;
}
document.getElementById("q7").innerText = rectangleArea({width:5,height:10});


// Q8
function getKeys(obj) {
  return Object.keys(obj);
}
document.getElementById("q8").innerText = getKeys({a:1,b:2,c:3});


// Q9
function mergeObjects(o1,o2) {
  return JSON.stringify(Object.assign({},o1,o2));
}
document.getElementById("q9").innerText = mergeObjects({a:1},{b:2});


// Q10
function sumArray(arr) {
  return arr.reduce((sum,n)=>sum+n,0);
}
document.getElementById("q10").innerText = sumArray([1,2,3,4,5]);

</script>

</body>
</html>
